<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/png" href="images/nyankoA.png">
    <style>
        main.gallery-main {
            max-width: 1200px;
            margin: 60px auto 100px;
            padding: 0 2rem;
        }

        .gallery-heading {
            font-family: var(--font-serif);
            font-size: 2.4rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            margin-bottom: 0.4rem;
        }

        .gallery-sub {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--text-light);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .gallery-grid {
            columns: 3 280px;
            column-gap: 8px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 8px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .gallery-item img {
            display: block;
            width: 100%;
            height: auto;
            filter: grayscale(100%);
            transition: opacity 0.3s, filter 0.4s;
        }

        .gallery-item:hover img {
            filter: grayscale(0%);
        }

        #photo-tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            padding: 0.35rem 0.65rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            font-family: var(--font-sans);
            display: none;
            flex-direction: column;
            gap: 0.1rem;
        }

        #photo-tooltip.visible {
            display: flex;
        }

        .tip-location {
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .tip-year {
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            opacity: 0.7;
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #lightbox.open {
            display: flex;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            display: block;
        }

        .lb-close {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .lb-close:hover { opacity: 1; }

        .lb-prev, .lb-next {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            padding: 1rem;
            opacity: 0.5;
            transition: opacity 0.2s;
            user-select: none;
        }
        .lb-prev:hover, .lb-next:hover { opacity: 1; }
        .lb-prev { left: 1rem; }
        .lb-next { right: 1rem; }

        .lb-counter {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .gallery-grid { columns: 2 140px; column-gap: 4px; }
            .gallery-item { margin-bottom: 4px; }
            .lb-prev { left: 0.25rem; }
            .lb-next { right: 0.25rem; }
        }
    </style>
</head>

<script>
  // Nav
  const nav = document.querySelector('.site-nav');
  const menuBtn = document.getElementById('menuBtn');
  const iconBurger = document.getElementById('iconBurger');
  const iconClose = document.getElementById('iconClose');
  function setExpanded(on) {
    nav.setAttribute('aria-expanded', on ? 'true' : 'false');
    if (menuBtn) menuBtn.setAttribute('aria-expanded', on ? 'true' : 'false');
    if (iconBurger) iconBurger.style.display = on ? 'none' : 'block';
    if (iconClose) iconClose.style.display = on ? 'block' : 'none';
  }
  if (menuBtn) menuBtn.addEventListener('click', () => setExpanded(nav.getAttribute('aria-expanded') !== 'true'));
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { setExpanded(false); closeLb(); } });
  window.matchMedia('(min-width: 861px)').addEventListener('change', e => { if (e.matches) setExpanded(false); });

  // i18n
  const I18N = {
    en: {
      "nav.home": "Home", "nav.research": "Research", "nav.publications": "Outputs",
      "nav.awards": "Awards/Grants", "nav.activities": "Others",
      "hero.name": "Takahiro Matsunaga",
      "photos.heading": "Gallery",
      "photos.sub": "Gear: Nikon D7000, Nikon Z50II"
    },
    ja: {
      "nav.home": "表紙", "nav.research": "研究", "nav.publications": "業績",
      "nav.awards": "受賞・獲得資金", "nav.activities": "その他",
      "hero.name": "Takahiro Matsunaga",
      "photos.heading": "写真館",
      "photos.sub": "機材: Nikon D7000, Nikon Z50ii",
    },
  };
  function applyLang(lang) {
    document.documentElement.setAttribute('lang', lang);
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (I18N[lang]?.[key]) el.textContent = I18N[lang][key];
    });
    document.querySelectorAll('.lang-switch button').forEach(btn => {
      const on = btn.dataset.lang === lang;
      btn.style.textDecoration = on ? 'underline' : 'none';
      btn.style.opacity = on ? '1' : '.6';
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }
  try {
    const saved = localStorage.getItem('site.lang') || 'en';
    applyLang(saved);
    document.querySelectorAll('.lang-switch button').forEach(btn => {
      btn.addEventListener('click', () => { localStorage.setItem('site.lang', btn.dataset.lang); applyLang(btn.dataset.lang); });
    });
  } catch(e) {}

  // Photo metadata — add location strings here as needed
  const photoMeta = {
    'DSC_0016.JPG': { location: 'Shibuya', year: '2025' },

    'DSC_0202.JPG': { location: 'Bitchu-Matsuyana, Okayama', year: '2025' },
    'DSC_0255.JPG': { location: 'Tomonoura, Hiroshima', year: '2025' },
    'DSC_0262.JPG': { location: 'Tomonoura, Hiroshima', year: '2025' },

  const tooltip = document.createElement('div');
  tooltip.id = 'photo-tooltip';
  document.body.appendChild(tooltip);

  document.querySelectorAll('.gallery-item img').forEach(img => {
    const filename = img.src.split('/').pop();
    const meta = photoMeta[filename];
    if (!meta) return;
    const item = img.parentElement;
    if (meta.location) item.dataset.tipLocation = meta.location;
    if (meta.year) item.dataset.tipYear = meta.year;
  });

  document.querySelectorAll('.gallery-item').forEach(item => {
    item.addEventListener('mouseenter', () => {
      const loc = item.dataset.tipLocation || '';
      const yr = item.dataset.tipYear || '';
      if (!loc && !yr) return;
      tooltip.innerHTML = '';
      if (loc) {
        const el = document.createElement('span');
        el.className = 'tip-location';
        el.textContent = loc;
        tooltip.appendChild(el);
      }
      if (yr) {
        const el = document.createElement('span');
        el.className = 'tip-year';
        el.textContent = yr;
        tooltip.appendChild(el);
      }
      tooltip.classList.add('visible');
    });
    item.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
    item.addEventListener('mousemove', e => {
      const offset = 14;
      let x = e.clientX + offset;
      let y = e.clientY + offset;
      if (x + tooltip.offsetWidth > window.innerWidth) x = e.clientX - tooltip.offsetWidth - offset;
      if (y + tooltip.offsetHeight > window.innerHeight) y = e.clientY - tooltip.offsetHeight - offset;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    });
  });

  // Lightbox
  const items = Array.from(document.querySelectorAll('.gallery-item img'));
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCounter = document.getElementById('lbCounter');
  let current = 0;

  function openLb(idx) {
    current = idx;
    lbImg.src = items[current].src;
    lbCounter.textContent = (current + 1) + ' / ' + items.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLb() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }
  function showPrev() { openLb((current - 1 + items.length) % items.length); }
  function showNext() { openLb((current + 1) % items.length); }

  items.forEach((img, i) => img.parentElement.addEventListener('click', () => openLb(i)));
  document.getElementById('lbClose').addEventListener('click', closeLb);
  document.getElementById('lbPrev').addEventListener('click', showPrev);
  document.getElementById('lbNext').addEventListener('click', showNext);
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLb(); });
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'ArrowLeft') showPrev();
    if (e.key === 'ArrowRight') showNext();
  });
</script>
